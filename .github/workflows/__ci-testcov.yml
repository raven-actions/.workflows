---
name: CI
on:
  workflow_call:
    inputs:
      debug:
        type: string
        description: Debug mode
        required: false

permissions: {}

# Allow one concurrent
concurrency:
  group: ${{ format('{0}-{1}-{2}-{3}-{4}', github.workflow, github.event_name, github.ref, github.base_ref, github.head_ref) }}
  cancel-in-progress: true

env:
  DEBUG: ${{ inputs.debug || secrets.ACTIONS_RUNNER_DEBUG || vars.ACTIONS_RUNNER_DEBUG || secrets.ACTIONS_STEP_DEBUG || vars.ACTIONS_STEP_DEBUG || false }}

jobs:
  build-test:
    name: 🏗️🧪 Build and Test
    if: ${{ contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name) || (github.event_name == 'pull_request' && !github.event.pull_request.draft) }}
    permissions:
      contents: read
      pull-requests: write
      checks: write
      id-token: write
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: 🩺 Debug
        if: ${{ env.DEBUG == 'true' }}
        uses: raven-actions/debug@9dbdeb7eea607a7d73411895c65987e71d59a466 # v1.2.0
        with:
          vars-context: ${{ toJson(vars) }}
          needs-context: ${{ toJson(needs) }}
          inputs-context: ${{ toJson(inputs) }}

      - name: ⤵️ Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          fetch-depth: 0
          persist-credentials: false

      - name: 🔄️ Detect changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: changes
        with:
          token: ${{ github.token }}
          filters: |
            app:
              - src/**
              - tests/**
              - package.json
              - package-lock.json
              - pnpm-lock.yaml
              - .node-version
              - jest.config.js
              - jest.config.*js
              - vitest.config.js
              - vitest.config.*js
              - tsconfig.json
              - action.yml
              - action.yaml
              - codecov.yml
              - codecov.yaml

      - name: 🚧 Setup pnpm
        if: ${{ steps.changes.outputs.app == 'true' }}
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7
        with:
          version: 10
          run_install: false

      - name: 🚧 Setup Node
        if: ${{ steps.changes.outputs.app == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: 🔀 Install dependencies
        if: ${{ steps.changes.outputs.app == 'true' }}
        run: pnpm deps:ci

      - name: 🏗️ Build
        if: ${{ steps.changes.outputs.app == 'true' }}
        run: pnpm build:ci

      - name: 🧪 Test
        if: ${{ steps.changes.outputs.app == 'true' }}
        run: pnpm test:ci:cov
        continue-on-error: true

      - name: 📤 Upload test results
        if: ${{ steps.changes.outputs.app == 'true' && matrix.os == 'ubuntu-24.04' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: reports/junit.xml
          if-no-files-found: warn

      - name: 📤 Upload coverage results
        if: ${{ steps.changes.outputs.app == 'true' && matrix.os == 'ubuntu-24.04' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-results
          path: coverage
          if-no-files-found: warn

      - name: 📜 Test report
        if: ${{ steps.changes.outputs.app == 'true' && matrix.os == 'ubuntu-24.04' }}
        # uses: phoenix-actions/test-reporting@f957cd93fc2d848d556fa0d03c57bc79127b6b5e # v15
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        with:
          token: ${{ github.token }}
          name: 📜 Test report
          path: reports/junit.xml
          reporter: jest-junit
          use-actions-summary: true

      - name: 📜 Test Coverage Report
        if: ${{ steps.changes.outputs.app == 'true' && matrix.os == 'ubuntu-24.04' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: coverage/cobertura-coverage.xml
          report_type: coverage

      - name: 📜 Test Results Report
        if: ${{ steps.changes.outputs.app == 'true' && matrix.os == 'ubuntu-24.04' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: reports/junit.xml
          report_type: test_results
